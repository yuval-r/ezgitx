# Cut Release — manual, maintainer-only release pipeline.
#
# What it does (full-auto): bump the version, run the gate, commit the bump to
# main, publish to crates.io (OIDC, no stored token), then push the tag — which
# triggers the cargo-dist "Release" workflow (release.yml) to build the unix
# binaries + installer + GitHub Release.
#
# WHO CAN RUN IT (defense in depth):
#   1. workflow_dispatch is the ONLY trigger. On GitHub, workflow_dispatch can
#      be invoked solely by users with write access — never by the public,
#      read-only users, or fork pull requests. There is no push/PR/schedule
#      trigger, so merging code can never cause a release.
#   2. `if: github.actor == 'yuval-r'` rejects anyone but the owner outright.
#   3. `environment: release` requires approval from its designated reviewer
#      (you) before the job runs, and is where the App secrets live — so the
#      credentials are never exposed to PRs or other workflows.
#
# The version input is passed via `env:` and referenced as "$VERSION" in shell
# so it can never be interpreted as a command (injection-safe), and it is
# validated as semver before use.
#
# ONE-TIME SETUP (see PR description):
#   - crates.io Trusted Publishing for `ezgitx`: GitHub repo yuval-r/ezgitx,
#     workflow `cut-release.yml`, environment `release`.
#   - A GitHub App (installed only on this repo, Contents: read+write); store
#     RELEASE_APP_ID + RELEASE_APP_PRIVATE_KEY as secrets in the `release`
#     environment; add the App to main's branch-protection bypass list so it
#     may push the bump commit.
#   - Environment `release`: required reviewer = you; deployment branch = main.

name: Cut Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New version, no leading v (e.g. 0.2.0)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: cut-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.actor == 'yuval-r'
    environment: release
    permissions:
      contents: write   # push the bump commit + tag
      id-token: write   # OIDC for crates.io trusted publishing
    env:
      VERSION: ${{ inputs.version }}   # referenced as "$VERSION" (never inlined into shell)
    steps:
      - name: Validate version is semver
        run: |
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+].+)?$ ]] \
            || { echo "::error::not a semver version: $VERSION"; exit 1; }

      - name: Mint a short-lived GitHub App token
        uses: actions/create-github-app-token@v1
        id: app
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app.outputs.token }}

      - name: Refuse to re-release an existing version
        run: |
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "::error::tag v$VERSION already exists"; exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable

      - name: Bump version
        run: |
          cargo install cargo-edit --locked
          cargo set-version "$VERSION"

      - name: Gate (test, clippy, fmt) — must pass before releasing
        run: |
          cargo test --locked
          cargo clippy --all-targets -- -D warnings
          cargo fmt --all --check

      - name: Commit and push the bump to main
        env:
          APP_SLUG: ${{ steps.app.outputs.app-slug }}
        run: |
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${APP_SLUG}[bot]@users.noreply.github.com"
          git commit -am "Release v$VERSION"
          git push origin main

      - name: Mint a short-lived crates.io token (OIDC trusted publishing)
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish to crates.io
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Tag and push (triggers cargo-dist's Release for binaries + installer)
        run: |
          git tag "v$VERSION"
          git push origin "v$VERSION"
